name: Build BBS Mod for 1.21.1

on:
  push:
    branches: [ "1.21.1" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build with Gradle
        run: ./gradlew build
      
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: bbs-mod-1.21.1
          path: build/libs/*.jar
